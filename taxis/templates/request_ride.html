{% extends 'base.html' %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
    /* Styling for the map to look modern and integrated */
    #map {
        height: 350px;
        width: 100%;
        border-radius: 0.75rem;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        margin-bottom: 1.5rem;
        border: 1px solid rgba(0,0,0,.125);
    }
    
    @media (min-width: 768px) {
        #map {
            height: 450px;
        }
    }

    /* Floating label adjustments if needed */
    .form-floating > .form-control-plaintext:focus, .form-floating > .form-control-plaintext:not(:empty), .form-floating > .form-control:focus, .form-floating > .form-control:not(:placeholder-shown) {
        padding-top: 1.625rem;
        padding-bottom: 0.625rem;
    }
    
    /* Icon alignment in floating labels */
    .floating-icon {
        position: absolute;
        top: 50%;
        right: 1rem;
        transform: translateY(-50%);
        color: #6c757d;
        z-index: 5;
    }
    
    /* Input with icon padding */
    .has-icon {
        padding-right: 2.5rem !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-4">
    <!-- Header Area -->
    <div class="d-flex align-items-center mb-4">
        <a href="{% url 'customer_dashboard' %}" class="btn btn-outline-secondary rounded-circle me-3 text-center" style="width: 45px; height: 45px; padding-top: 8px;">
            <i class="bi bi-arrow-left fs-5"></i>
        </a>
        <h2 class="m-0 fw-bold">Solicitar un Taxi</h2>
    </div>

    <!-- Main Card -->
    <div class="card shadow-sm border-0 rounded-4 mb-4">
        <div class="card-body p-4">
            <form method="POST" id="request-ride-form">
                {% csrf_token %}
                
                <!-- Origen -->
                <div class="form-floating mb-3 position-relative">
                    <input type="text" class="form-control has-icon bg-light" id="origin" name="origin" placeholder="Origen" required readonly>
                    <label for="origin"><i class="bi bi-geo-alt-fill text-primary me-2"></i>Origen</label>
                    <i class="bi bi-crosshair floating-icon"></i>
                </div>

                <!-- Mapa -->
                <div id="map"></div>

                <!-- Destinos Container -->
                <div id="destinations">
                    <div class="destination-group mb-3 position-relative form-floating">
                        <input type="text" class="form-control has-icon destination" id="destination-0" name="destinations[]" placeholder="Destino" required>
                        <label for="destination-0"><i class="bi bi-geo-fill text-success me-2"></i>Destino (Elige en el mapa o busca)</label>
                        <i class="bi bi-search floating-icon"></i>
                        <input type="hidden" class="destination-coords" name="destination_coords[]">
                    </div>
                </div>

                <!-- Agregar otro destino -->
                <div class="text-end mb-4">
                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-semibold" id="add-destination">
                        <i class="bi bi-plus-circle me-1"></i> Agregar otro destino
                    </button>
                </div>

                <!-- Resumen Estimado -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="form-floating position-relative">
                            <input type="text" class="form-control has-icon bg-light" id="distance" name="distance" placeholder="0.0" readonly>
                            <label for="distance"><i class="bi bi-signpost-split me-2"></i>Distancia est. (km)</label>
                            <i class="bi bi-ruler floating-icon"></i>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating position-relative">
                            <input type="text" class="form-control has-icon bg-light text-success fw-bold fs-5" id="price" name="price" placeholder="0.00" readonly>
                            <label for="price"><i class="bi bi-currency-dollar me-2"></i>Precio estimado</label>
                            <i class="bi bi-cash-stack floating-icon text-success"></i>
                        </div>
                    </div>
                </div>

                <input type="hidden" id="origin_latitude" name="origin_latitude">
                <input type="hidden" id="origin_longitude" name="origin_longitude">

                <!-- Botones de acción -->
                <hr class="my-4 text-muted">
                
                <div class="d-grid gap-3 d-md-flex justify-content-md-end">
                    <button type="button" class="btn btn-outline-warning btn-lg rounded-pill px-4 fw-bold order-2 order-md-1" id="btn-negotiate">
                        <i class="bi bi-piggy-bank me-2"></i> Proponer precio
                    </button>
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-sm order-1 order-md-2 mb-2 mb-md-0">
                        <i class="bi bi-check2-circle me-2"></i> Solicitar Viaje
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal de Negociación -->
<div class="modal fade" id="negotiationModal" tabindex="-1" aria-labelledby="negotiationModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="negotiationModalLabel">💰 Proponer Precio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info">
                    <strong>Precio sugerido:</strong> $<span id="modal-suggested-price">0.00</span>
                </div>
                
                <form id="negotiation-form">
                    <div class="mb-3">
                        <label for="proposed-price" class="form-label">Tu propuesta de precio ($)</label>
                        <input type="number" 
                               class="form-control form-control-lg" 
                               id="proposed-price" 
                               step="0.01" 
                               min="0.50" 
                               placeholder="Ej: 2.50"
                               required>
                        <div class="form-text">
                            La central revisará tu propuesta y te responderá pronto.
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="negotiation-message" class="form-label">Mensaje opcional</label>
                        <textarea class="form-control" 
                                  id="negotiation-message" 
                                  rows="2" 
                                  placeholder="Ej: Es una distancia corta, ¿pueden aceptar este precio?"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-warning" id="btn-submit-negotiation">
                    📤 Enviar propuesta
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    let map, originMarker, destinationMarkers = [];
    let originLat, originLon;
    let activeDestinationIndex = 0; // Índice del destino actualmente seleccionado/enfocado

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: -2.189412, lng: -79.889066 },
            zoom: 13,
            mapId: 'DEMO_MAP_ID'
        });

        // Evento click en el mapa para seleccionar el destino activo
        map.addListener('click', function(e) {
            const lat = e.latLng.lat();
            const lng = e.latLng.lng();
            
            // Geocoding inverso para obtener la dirección a partir de las coordenadas
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: { lat, lng } }, (results, status) => {
                let address = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
                if (status === "OK" && results[0]) {
                    address = results[0].formatted_address;
                }
                
                // Actualizar inputs del destino activo
                const destinationInputs = document.querySelectorAll('.destination');
                const coordsInputs = document.querySelectorAll('.destination-coords');
                
                if (destinationInputs[activeDestinationIndex]) {
                    destinationInputs[activeDestinationIndex].value = address;
                    coordsInputs[activeDestinationIndex].value = `${lat},${lng}`;
                    
                    // Actualizar o crear marcador
                    if (destinationMarkers[activeDestinationIndex]) {
                        destinationMarkers[activeDestinationIndex].setPosition({ lat, lng });
                    } else {
                        destinationMarkers[activeDestinationIndex] = new google.maps.Marker({
                            position: { lat, lng },
                            map: map,
                            title: `Destino ${activeDestinationIndex + 1}`,
                            icon: {
                                url: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png',
                                scaledSize: new google.maps.Size(40, 40)
                            },
                            animation: google.maps.Animation.DROP,
                        });
                    }
                    
                    calculateTotalDistanceAndPrice();
                }
            });
        });

        // Agregar capa de tráfico
        const trafficLayer = new google.maps.TrafficLayer();
        trafficLayer.setMap(map);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    setDeviceLocation(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    console.error('Error al obtener ubicación:', error);
                    alert('No se pudo obtener tu ubicación.');
                }
            );
        }

        setupAutocompleteForDestinations();
    }

    function setDeviceLocation(lat, lng) {
        originLat = lat;
        originLon = lng;

        const originPos = { lat: originLat, lng: originLon };

        if (originMarker) {
            originMarker.setPosition(originPos);
        } else {
            originMarker = new google.maps.Marker({
                position: originPos,
                map: map,
                title: 'Tu ubicación',
                icon: {
                    url: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png', // Icono personalizado
                    scaledSize: new google.maps.Size(40, 40) // Escalar el tamaño del icono
                },
                animation: google.maps.Animation.BOUNCE, // Animación inicial
            });

            // Detener la animación después de 2 segundos
            setTimeout(() => originMarker.setAnimation(null), 2000);
        }

        map.setCenter(originPos);
        geocodeLatLng(lat, lng, 'origin');
    }

    function setupAutocompleteForDestinations() {
        const destinationInputs = document.querySelectorAll('.destination');
        destinationInputs.forEach((input, index) => {
            // Listener para actualizar el activeDestinationIndex cuando el input recibe el foco
            input.addEventListener('focus', () => {
                activeDestinationIndex = index;
            });

            const autocomplete = new google.maps.places.Autocomplete(input);
            autocomplete.setFields(['place_id', 'geometry', 'name']);

            autocomplete.addListener('place_changed', function () {
                const place = autocomplete.getPlace();
                if (!place.geometry) return;

                const lat = place.geometry.location.lat();
                const lng = place.geometry.location.lng();

                document.querySelectorAll('.destination-coords')[index].value = `${lat},${lng}`;

                if (destinationMarkers[index]) {
                    destinationMarkers[index].setPosition({ lat, lng });
                } else {
                    destinationMarkers[index] = new google.maps.Marker({
                        position: { lat, lng },
                        map: map,
                        title: `Destino ${index + 1}`,
                        icon: {
                            url: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png', // Icono personalizado
                            scaledSize: new google.maps.Size(40, 40) // Escalar tamaño
                        },
                        animation: google.maps.Animation.DROP, // Animación al aparecer
                    });
                }

                calculateTotalDistanceAndPrice();
            });
        });
    }

    function geocodeLatLng(lat, lng, field) {
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ location: { lat, lng } }, (results, status) => {
            if (status === 'OK' && results[0]) {
                const address = results[0].formatted_address;

                if (field === 'origin') {
                    document.getElementById('origin').value = address;
                    document.getElementById('origin_latitude').value = lat;
                    document.getElementById('origin_longitude').value = lng;
                    console.log('✅ Dirección de origen obtenida:', address);
                }
            } else {
                console.error('❌ Geocoder failed due to:', status);
                // Fallback: usar coordenadas como dirección
                if (field === 'origin') {
                    const fallbackAddress = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
                    document.getElementById('origin').value = fallbackAddress;
                    document.getElementById('origin_latitude').value = lat;
                    document.getElementById('origin_longitude').value = lng;
                    console.warn('⚠️ Usando coordenadas como dirección de origen');
                }
            }
        });
    }

    // Validar formulario antes de enviar
    document.querySelector('form').addEventListener('submit', function(e) {
        const origin = document.getElementById('origin').value;
        const originLat = document.getElementById('origin_latitude').value;
        const originLng = document.getElementById('origin_longitude').value;

        // Si el origen está vacío, intentar obtenerlo de nuevo
        if (!origin || origin.trim() === '') {
            e.preventDefault();
            alert('Por favor espera mientras obtenemos tu ubicación...');
            
            if (originLat && originLng) {
                geocodeLatLng(parseFloat(originLat), parseFloat(originLng), 'origin');
                setTimeout(() => {
                    this.submit();
                }, 2000);
            } else {
                alert('No se pudo obtener tu ubicación. Por favor recarga la página.');
            }
            return false;
        }

        console.log('📤 Enviando carrera con origen:', origin);
    });

    function calculateTotalDistanceAndPrice() {
        if (!originLat || !originLon) return;

        const service = new google.maps.DistanceMatrixService();
        const destinations = destinationMarkers.map(marker => marker.position); // Usar directamente la propiedad position

        if (destinations.length === 0) return;

        service.getDistanceMatrix({
            origins: [{ lat: originLat, lng: originLon }],
            destinations: destinations,
            travelMode: 'DRIVING',
        }, (response, status) => {
            if (status === 'OK') {
                let totalDistance = 0;

                response.rows[0].elements.forEach((element) => {
                    totalDistance += element.distance.value; // Sumar distancias en metros
                });

                const distanceInKm = totalDistance / 1000; // Convertir a kilómetros
                const threshold = 4.44; // Límite para tarifa base
                const basePrice = 2.00; // Precio base
                const pricePerKm = 0.25; // Precio por kilómetro adicional (bajado para viajes largos)
                
                let price = basePrice;
                if (distanceInKm > threshold) {
                    const extraDistance = distanceInKm - threshold;
                    price += extraDistance * pricePerKm;
                }


                // Actualizar campos con la distancia y el precio
                document.getElementById('distance').value = distanceInKm.toFixed(2);
                document.getElementById('price').value = price.toFixed(2);
            } else {
                console.error('Error al calcular la distancia:', status);
            }
        });
    }

    document.getElementById('add-destination').addEventListener('click', () => {
        const destinationGroup = document.createElement('div');
        const newId = `destination-${destinationMarkers.length + 1}`;
        destinationGroup.classList.add('destination-group', 'mb-3', 'position-relative', 'form-floating');
        destinationGroup.innerHTML = `
                <input type="text" class="form-control has-icon destination" id="${newId}" name="destinations[]" placeholder="Destino" required>
                <label for="${newId}"><i class="bi bi-geo-fill text-success me-2"></i>Destino (Elige en el mapa o busca)</label>
                <i class="bi bi-search floating-icon"></i>
                <input type="hidden" class="destination-coords" name="destination_coords[]">
            `;
        document.getElementById('destinations').appendChild(destinationGroup);
        
        // Enfocar automáticamente el nuevo destino creado
        const newInputs = document.querySelectorAll('.destination');
        const newIndex = newInputs.length - 1;
        
        setupAutocompleteForDestinations();
        
        // Actualizar activeIndex y enfocar
        activeDestinationIndex = newIndex;
        newInputs[newIndex].focus();
    });

    // ============================================
    // NEGOCIACIÓN DE PRECIOS
    // ============================================
    
    const negotiationModal = new bootstrap.Modal(document.getElementById('negotiationModal'));
    
    // Abrir modal de negociación
    document.getElementById('btn-negotiate').addEventListener('click', () => {
        const suggestedPrice = document.getElementById('price').value.replace('$', '').trim();
        
        if (!suggestedPrice || suggestedPrice === '0.00') {
            alert('⚠️ Primero ingresa un destino para calcular el precio');
            return;
        }
        
        // Mostrar precio sugerido en el modal
        document.getElementById('modal-suggested-price').textContent = suggestedPrice;
        
        // Limpiar campos
        document.getElementById('proposed-price').value = '';
        document.getElementById('negotiation-message').value = '';
        
        // Abrir modal
        negotiationModal.show();
    });
    
    // Enviar propuesta de negociación
    document.getElementById('btn-submit-negotiation').addEventListener('click', async () => {
        const proposedPrice = document.getElementById('proposed-price').value;
        const message = document.getElementById('negotiation-message').value;
        const suggestedPrice = document.getElementById('modal-suggested-price').textContent;
        
        if (!proposedPrice || parseFloat(proposedPrice) <= 0) {
            alert('⚠️ Por favor ingresa un precio válido');
            return;
        }
        
        // Validar que el precio no sea demasiado bajo (mínimo $0.50)
        if (parseFloat(proposedPrice) < 0.50) {
            alert('⚠️ El precio mínimo es $0.50');
            return;
        }
        
        // Preparar datos para enviar
        const negotiationData = {
            origin: document.getElementById('origin').value,
            origin_latitude: document.getElementById('origin_latitude').value,
            origin_longitude: document.getElementById('origin_longitude').value,
            destination: document.querySelector('.destination').value,
            destination_coords: document.querySelector('.destination-coords').value,
            suggested_price: suggestedPrice,
            proposed_price: proposedPrice,
            message: message
        };
        
        console.log('📤 Enviando propuesta de negociación:', negotiationData);
        
        try {
            const response = await fetch('/api/price-negotiation/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify(negotiationData)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                negotiationModal.hide();
                alert('✅ Propuesta enviada exitosamente!\n\nLa central revisará tu propuesta y te responderá pronto.\n\nRecibirás una notificación cuando haya una respuesta.');
                // Opcional: redirigir al dashboard
                window.location.href = '/customer-dashboard/';
            } else {
                alert('❌ Error: ' + (result.error || 'No se pudo enviar la propuesta'));
            }
        } catch (error) {
            console.error('Error al enviar propuesta:', error);
            alert('❌ Error de conexión. Por favor intenta de nuevo.');
        }
    });
</script>

<script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAtEPZgbPBwnJGrvIuwplRJDFbr0tmbnyQ&callback=initMap&v=weekly&libraries=places,marker"
    defer></script>




{% endblock %}
